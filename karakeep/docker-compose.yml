services:

  karakeepapp:
    image: ghcr.io/karakeep-app/karakeep:0.32.0
    container_name: karakeepapp
    restart: unless-stopped
    volumes:
      - ./karakeep/data:/data
    env_file:
      - .env
    environment:
      MEILI_ADDR: http://karakeepmeilisearch:7700
      BROWSER_WEB_URL: http://karakeepchrome:9222
      NEXTAUTH_URL: https://bm.nlindemann.de
      DISABLE_SIGNUPS: true
      # You almost never want to change the value of the DATA_DIR variable.
      # If you want to mount a custom directory, change the volume mapping above instead.
      DATA_DIR: /data # DON'T CHANGE THIS
    networks:
      - reverse-proxy
      - karakeep-network

  karakeepchrome:
    image: gcr.io/zenika-hub/alpine-chrome:latest
    container_name: karakeepchrome
    restart: unless-stopped
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    networks:
      - karakeep-network

  karakeepmeilisearch:
    image: getmeili/meilisearch:v1.17.1
    container_name: karakeepmeilisearch
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ./karakeep/meilisearch:/meili_data
    networks:
      - karakeep-network

networks:

  reverse-proxy:
    external: true

  karakeep-network:
    driver: bridge

